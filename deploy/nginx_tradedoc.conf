# 贸易云档 - phpStudy Nginx 站点配置
# 复制到 phpStudy 的 Nginx vhosts 目录后，phpStudy 重启 Nginx

upstream tradedoc_php {
    # 指向 phpStudy 的 PHP-CGI 端口（phpStudy 默认起在 9002）
    # 在 phpStudy 面板可以确认: 点 PHP 版本 → 端口设置
    server 127.0.0.1:9002 max_fails=3 fail_timeout=10s;
}

server {
    listen       8000;
    server_name  localhost 127.0.0.1;

    charset utf-8;
    client_max_body_size 100m;

    # ===== 项目根目录 - 改成实际路径 =====
    root "D:/work/product/business_file_management/tradedoc/public";
    index index.php index.html;

    # 已编译的前端资源
    location /build/ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # 其他静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }

    # Laravel 路由：所有非静态请求回落到 index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP 通过 FastCGI 转发到 phpStudy 的 php-cgi 池
    location ~ \.php$ {
        fastcgi_pass   tradedoc_php;
        fastcgi_index  index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;
        include        fastcgi_params;

        fastcgi_read_timeout 300;
        fastcgi_connect_timeout 60;
        fastcgi_send_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;

        # phpStudy 偶尔回收 worker 时自动重试，避免偶发 502
        fastcgi_next_upstream error timeout invalid_header non_idempotent;
        fastcgi_next_upstream_tries 3;
        fastcgi_next_upstream_timeout 10s;
    }

    location ~ /\. {
        deny all;
    }

    # ===== 日志路径 - 改成实际路径 =====
    access_log  D:/phpstudy_pro/Extensions/Nginx1.25.2/logs/tradedoc_access.log;
    error_log   D:/phpstudy_pro/Extensions/Nginx1.25.2/logs/tradedoc_error.log;
}
