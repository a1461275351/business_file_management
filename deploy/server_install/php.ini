[Date]
date.timezone=Asia/Shanghai

[PHP]
; 基本配置
max_execution_time = 300
max_input_time = 60
max_input_vars = 3000
memory_limit = 256M
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 100

; 错误处理
display_errors = On
display_startup_errors = On
log_errors = On
html_errors = On
error_log = D:/phpstudy_pro/Extensions/php/php8.5.0nts/php_errors.log
error_reporting = E_ALL

; URL
allow_url_fopen = On
allow_url_include = Off

; 扩展目录
extension_dir = "D:/phpstudy_pro/Extensions/php/php8.5.0nts/ext"

; ============================================================
; PHP 扩展（Laravel 必需 + 常用）
; ============================================================
extension=php_curl.dll
extension=php_openssl.dll
extension=php_mbstring.dll
extension=php_pdo_mysql.dll
extension=php_mysqli.dll
extension=php_fileinfo.dll
extension=php_gd.dll
extension=php_zip.dll
extension=php_intl.dll
extension=php_exif.dll
extension=php_sodium.dll
extension=php_sockets.dll

; ============================================================
; OPcache + JIT 配置
; ============================================================
;zend_extension=opcache  ; PHP 8.5 内置OPcache，无需显式加载

[opcache]
opcache.enable = 1
opcache.enable_cli = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
opcache.save_comments = 1

; JIT 配置
opcache.jit = 1255
opcache.jit_buffer_size = 128M

; ============================================================
; Session
; ============================================================
[Session]
session.save_handler = files
session.gc_maxlifetime = 7200

; ============================================================
; mbstring
; ============================================================
[mbstring]
mbstring.language = Chinese
;mbstring.internal_encoding = UTF-8  ; PHP 8.5 已废弃，使用 default_charset 即可

; ============================================================
; MySQLi
; ============================================================
[MySQLi]
mysqli.default_host = 127.0.0.1
mysqli.default_port = 3306
